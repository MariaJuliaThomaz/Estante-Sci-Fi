<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estante Sci-Fi</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #121212; color: #ffffff;}
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background-color: #6200ea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #3700b3; }
    </style>
</head>
<body>

    <h1>Minha Estante Sci-Fi 👽📚</h1>
    <p>Digite o nome do seu autor favorito para buscar no banco de dados!</p>

    <form id ="formBusca" action="/livros" method="GET">
        <select name= "tipoBusca">
            <option value= "autor">Pesquisar por Autor </option>    
            <option value="titulo">Pesquisar por Título</option>
        </select>
        <input type="text" name="termo" placeholder="Ex: Stephen King ou It" required>
        <button type="submit">Pesquisar Livros</button>
    </form>

    <div id="estante" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px;">
        </div>
    <script src="script.js"></script>
</body>
</html>
